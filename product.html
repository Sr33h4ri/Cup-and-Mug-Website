<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>The Cup and Mug</title>

    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
            <div class="container">
                <div class="navbar">
                    <img class="back-btn" src="src/backIcon.png" alt="Back" onclick="history.back()"/>
                    <h1 class="logo">The Cup and Mug</h1>
                    <nav class="nav-links">
                        <a href="index.html">Home</a>
                        <a href="categoryGrid.html">Shop</a>
                        <a href="#">About</a>
                    </nav>
                    <div style="position:relative; cursor:pointer" onclick="openCart()">
                        <img class="cart-icon" src="src/cartIcon.png" alt="Shopping cart" />
                        <span class="cart-count" id="cart-count">0</span>
                    </div>
                </div>
            </div>
    </header>
 
   <main class="product-page container">

    <div class="product-image-wrapper">
        <img id="product-image" src="" alt="" class="product-image">
    </div>

    <div class="product-info">
        <h2 id="product-name" class="product-title">—</h2>
        <p id="product-price" class="product-price">—</p>
        <hr class="product-divider">
        <p id="product-description" class="product-description"></p>
        <div class="product-actions">
            <button id="qty-dec" aria-label="Decrease" class="qty-btn">−</button>
            <span id="qty-value" class="qty-value">1</span>
            <button id="qty-inc" aria-label="Increase" class="qty-btn">+</button>
            <button id="add-to-cart-btn" class="add-to-cart-btn">Add to Cart</button>
        </div>
    </div>

</main>
    <div id="cart-backdrop" class="cart-backdrop" onclick="closeCart()"></div>
    <div id="cart-overlay" style="display:none" class="cart-overlay">
        <button class="cart-overlay-close" onclick="closeCart()">✕</button>
        <h2 class="cart-overlay-title">Cart</h2>
        <hr class="cart-overlay-divider">
        <div id="cart-overlay-items"></div>
        <hr class="cart-overlay-divider">
        <div class="cart-overlay-total">
            <span>Total</span>
            <span id="cart-overlay-total">$0.00</span>
        </div>
        <button type="button" class="btn" style="margin-top:1rem"
            onclick="window.location.href='checkout.html'">Checkout</button>
    </div>
 
    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search)
        const productId = parseInt(params.get("id"))
        const product = products.find(p => p.id === productId)
 
       if (!Number.isInteger(productId) || !product) {
            document.querySelector("main").innerHTML = "<p>Product not found.</p>";
        } else {
            document.getElementById("product-name").textContent = product.name;
            document.getElementById("product-price").textContent = `$${product.price}.00`;
            document.getElementById("product-description").textContent = product.description || "";
            document.getElementById("product-image").src = product.image;
            document.getElementById("product-image").alt = product.name;

            document.getElementById("add-to-cart-btn").addEventListener("click", () => {
                addToCart(product.id, qty);
            });
        }
 
        let qty = 1
        const qtyEl = document.getElementById("qty-value")
 
        document.getElementById("qty-dec").addEventListener("click", () => {
            if (qty > 1) { qty--; qtyEl.textContent = qty }
        })
        document.getElementById("qty-inc").addEventListener("click", () => {
            qty++; qtyEl.textContent = qty
        })
 
        document.getElementById("add-to-cart-btn").addEventListener("click", () => {
            for (let i = 0; i < qty; i++) addToCart(productId)
        })
 
    </script>
</body>
</html>
