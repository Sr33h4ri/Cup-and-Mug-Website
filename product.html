<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product — The Cup and Mug</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <header class="site-header">
        <div class="container navbar">
            <h1 class="logo">The Cup and Mug</h1>
            <nav class="nav-links">
                <a href="homepage.html">Home</a>
                <a href="categoryGrid.html">Shop</a>
                <a href="#">About</a>
            </nav>
            <div style="position:relative; cursor:pointer" onclick="openCart()">
                <img class="cart-icon" src="img/icon.svg" alt="Shopping cart" />
                <span id="cart-count" style="
                    position:absolute; top:-8px; right:-8px;
                    background:#f0a020; color:white;
                    border-radius:50%; width:18px; height:18px;
                    font-size:0.7rem; font-weight:700;
                    display:flex; align-items:center; justify-content:center;
                ">0</span>
            </div>
        </div>
    </header>
 
    <main class="container" style="padding: 4rem 0 6rem; display:flex; gap:4rem; align-items:flex-start;">
 
        <!-- Left: image -->
        <div style="flex:0 0 420px; border-radius:16px; overflow:hidden;">
            <img id="product-image" src="" alt="" style="width:100%; height:380px; object-fit:cover; display:block;" />
        </div>
 
        <!-- Right: info -->
        <div style="flex:1; display:flex; flex-direction:column; gap:0.75rem; padding-top:0.5rem;">
            <h2 id="product-name" style="font-size:2.8rem; font-weight:700; color:#2a2693; line-height:1.1;">—</h2>
            <p id="product-price" style="font-size:1.6rem; font-weight:700; color:#151515;">—</p>
            <hr style="border:none; border-top:2px solid #2a2693; width:200px; margin:0.25rem 0 0.5rem;" />
            <p id="product-description" style="font-size:1rem; line-height:1.7; color:#444; max-width:380px;"></p>
 
            <!-- Quantity + Add to Cart -->
            <div style="display:flex; align-items:center; gap:1.25rem; margin-top:1.5rem;">
                <button id="qty-dec" aria-label="Decrease" style="
                    width:36px; height:36px; border-radius:50%;
                    border:2px solid #2a2693; background:transparent;
                    color:#2a2693; font-size:1.3rem; font-weight:700;
                    cursor:pointer; display:grid; place-items:center;
                ">−</button>
 
                <span id="qty-value" style="font-size:1.2rem; font-weight:700; min-width:1.5rem; text-align:center;">1</span>
 
                <button id="qty-inc" aria-label="Increase" style="
                    width:36px; height:36px; border-radius:50%;
                    border:2px solid #2a2693; background:transparent;
                    color:#2a2693; font-size:1.3rem; font-weight:700;
                    cursor:pointer; display:grid; place-items:center;
                ">+</button>
 
                <button id="add-to-cart-btn" style="
                    background:#f0a020; color:#fff; border:none;
                    border-radius:8px; padding:0.75rem 2rem;
                    font-family:inherit; font-size:1.1rem; font-weight:700;
                    cursor:pointer;
                ">Add to Cart</button>
            </div>
        </div>
    </main>
 
    <div id="cart-overlay" style="display:none" class="cart-overlay">
        <button class="cart-overlay-close" onclick="closeCart()">✕</button>
        <h3>Your Cart</h3>
        <div id="cart-overlay-items"></div>
        <div class="cart-overlay-total">
            <span>Total</span>
            <span id="cart-overlay-total">$0.00</span>
        </div>
        <button type="button" class="btn" style="margin-top:1rem"
            onclick="window.location.href='checkout.html'">Checkout</button>
    </div>
 
    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search)
        const productId = parseInt(params.get("id"))
        const product = products.find(p => p.id === productId)
 
        if (product) {
            document.title = `${product.name} — The Cup and Mug`
            document.getElementById("product-name").textContent = product.name
            document.getElementById("product-price").textContent = `$${product.price}.00`
            document.getElementById("product-description").textContent = product.description || ""
            document.getElementById("product-image").src = product.image
            document.getElementById("product-image").alt = product.name
        }
 
        let qty = 1
        const qtyEl = document.getElementById("qty-value")
 
        document.getElementById("qty-dec").addEventListener("click", () => {
            if (qty > 1) { qty--; qtyEl.textContent = qty }
        })
        document.getElementById("qty-inc").addEventListener("click", () => {
            qty++; qtyEl.textContent = qty
        })
 
        document.getElementById("add-to-cart-btn").addEventListener("click", () => {
            for (let i = 0; i < qty; i++) addToCart(productId)
        })
 
    </script>
</body>
</html>
