<!DOCTYPE html>
<html lang="en">
    <head>
            <meta charset="UTF-8" />
            <meta
                name="viewport"
                content="width=device-width, initial-scale=1.0"
            />

            <title>The Cup and Mug</title>

            <link rel="stylesheet" href="index.css" />
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
        </head>

    <body>
        <header class="site-header">
            <div class="container">
                <div class="navbar">
                    <img class="back-btn" src="src/backIcon.png" alt="Back" onclick="history.back()"/>
                    <h1 class="logo">The Cup and Mug</h1>
                    <nav class="nav-links">
                        <a href="homepage.html">Home</a>
                        <a href="categoryGrid.html">Shop</a>
                        <a href="#">About</a>
                    </nav>
                    <div style="position:relative; cursor:pointer" onclick="openCart()">
                        <img class="cart-icon" src="src/cartIcon.png" alt="Shopping cart" />
                        <span class="cart-count" id="cart-count">0</span>
                    </div>
                </div>
            </div>
        </header>
        <section class = "product-category-grid">
            <div class="category-card" onclick="window.location.href='productGrid.html?category=mugs'">
                <div class="product-card__image-wrap">
                    <img src="your-image.jpg" alt="Product name" class="product-card__img">
                </div>
                <div class="category-card__info">
                    <h4 class="category-card__name">Mugs</h4>
                    <div class="product-card__footer">
                    </div>
                </div>
            </div>
            <div class="category-card">
                <div class="product-card__image-wrap"  onclick="window.location.href='productGrid.html?category=bowls'">
                    <img src="your-image.jpg" alt="Product name" class="product-card__img">
                </div>
                <div class="category-card__info">
                    <h4 class="category-card__name">Bowls</h4>
                    <div class="product-card__footer">
                    </div>
                </div>
            </div>
        </section>
        <div id="cart-overlay" style="display:none" class="cart-overlay">
            <button class="cart-overlay-close" onclick="closeCart()">✕</button>
            <h3>Your Cart</h3>
            <div id="cart-overlay-items"></div>
            <div class="cart-overlay-total">
                <span>Total</span>
                <span id="cart-overlay-total">$0.00</span>
            </div>
            <button type="button" class="btn" style="margin-top:1rem"
                onclick="window.location.href='checkout.html'">Checkout</button>
        </div>
        <script src="products.js"></script>
        <script src="cart.js"></script>
        
    </body>
</html>
