    <!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8" />
            <meta
                name="viewport"
                content="width=device-width, initial-scale=1.0"
            />

            <title>The Cup and Mug</title>

            <link rel="stylesheet" href="index.css" />
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
        </head>

        <body>
            <header class="site-header">
                <div class="container">
                    <div class="navbar">
                        <img class="back-btn" src="src/backIcon.png" alt="Back" onclick="history.back()"/>
                        <h1 class="logo">The Cup and Mug</h1>
                        <nav class="nav-links">
                            <a href="homepage.html">Home</a>
                            <a href="categoryGrid.html">Shop</a>
                            <a href="#">About</a>
                        </nav>
                        <div style="position:relative; cursor:pointer" onclick="openCart()">
                            <img class="cart-icon" src="src/cartIcon.png" alt="Shopping cart" />
                            <span class="cart-count" id="cart-count">0</span>
                        </div>
                    </div>
                </div>
            </header>
            <section class = "product-category-grid">
                <div class="row">
                    <div class="col-75">
                        <div class="container">
                        <form>
                            <div class="row">
                            <div class="col-50">
                                <h3>Billing Address</h3>
                                <label for="fname"><i class="fa fa-user"></i> Full Name</label>
                                <input type="text" id="fname" name="firstname" placeholder="John M. Doe">
                                <label for="email"><i class="fa fa-envelope"></i> Email</label>
                                <input type="text" id="email" name="email" placeholder="john@example.com">
                                <label for="adr"><i class="fa fa-address-card-o"></i> Address</label>
                                <input type="text" id="adr" name="address" placeholder="542 W. 15th Street">
                                <label for="city"><i class="fa fa-institution"></i> City</label>
                                <input type="text" id="city" name="city" placeholder="New York">

                                <div class="row">
                                <div class="col-50">
                                    <label for="state">State</label>
                                    <input type="text" id="state" name="state" placeholder="NY">
                                </div>
                                <div class="col-50">
                                    <label for="zip">Zip</label>
                                    <input type="text" id="zip" name="zip" placeholder="10001">
                                </div>
                                </div>
                            </div>

                            <div class="col-50">
                                <h3>Payment</h3>
                                <label for="fname">Accepted Cards</label>
                                <div class="icon-container">
                                <i class="fa fa-cc-visa" style="color:navy;"></i>
                                <i class="fa fa-cc-amex" style="color:blue;"></i>
                                <i class="fa fa-cc-mastercard" style="color:red;"></i>
                                <i class="fa fa-cc-discover" style="color:orange;"></i>
                                </div>
                                <label for="cname">Name on Card</label>
                                <input type="text" id="cname" name="cardname" placeholder="John More Doe">
                                <label for="ccnum">Credit card number</label>
                                <input type="text" id="ccnum" name="cardnumber" placeholder="1111-2222-3333-4444">
                                <label for="expmonth">Exp Month</label>
                                <input type="text" id="expmonth" name="expmonth" placeholder="September">

                                <div class="row">
                                <div class="col-50">
                                    <label for="expyear">Exp Year</label>
                                    <input type="text" id="expyear" name="expyear" placeholder="2018">
                                </div>
                                <div class="col-50">
                                    <label for="cvv">CVV</label>
                                    <input type="text" id="cvv" name="cvv" placeholder="352">
                                </div>
                                </div>
                            </div>

                            </div>
                            <label>
                            <input type="checkbox" checked="checked" name="sameadr"> Shipping address same as billing
                            </label>
                            <button type="button" onclick="window.location.href='confirmation.html'" class="btn">
                                Pay Now
                            </button>
                        </form>
                        </div>
                    </div>

                    <div class="col-25">
                        <div class="container">
                            <h4>Cart <span class="price" style="color:black"><b id="checkout-count"></b></span></h4>
                            <div id="checkout-items"></div>
                            <hr>
                            <p>Total <span class="price" style="color:black"><b id="checkout-total"></b></span></p>
                        </div>
                    </div>
                </div>
            </section>

            <div id="cart-overlay" style="display:none" class="cart-overlay">
                <button class="cart-overlay-close" onclick="closeCart()">✕</button>
                <h3>Your Cart</h3>
                <div id="cart-overlay-items"></div>
                <div class="cart-overlay-total">
                    <span>Total</span>
                    <span id="cart-overlay-total">$0.00</span>
                </div>
                <button type="button" class="btn" style="margin-top:1rem"
                    onclick="window.location.href='checkout.html'">Checkout</button>
            </div>
            
            <script src="products.js"></script>
            <script src="cart.js"></script>
            <script>
                const cart = getCart();
                const itemsEl = document.getElementById("checkout-items");
                const totalEl = document.getElementById("checkout-total");
                const countEl = document.getElementById("checkout-count");

                let total = 0;
                let count = 0;

                cart.forEach(item => {
                    itemsEl.innerHTML += `
                        <p>
                            <a href="product.html?id=${item.id}">${item.name} × ${item.quantity}</a>
                            <span class="price">$${(item.price * item.quantity).toFixed(2)}</span>
                        </p>
                    `;
                    total += item.price * item.quantity;
                    count += item.quantity;
                });

                totalEl.textContent = "$" + total.toFixed(2);
                countEl.textContent = count;

                if (cart.length === 0) {
                    itemsEl.innerHTML = "<p style='opacity:0.5'>Your cart is empty.</p>";
                    totalEl.textContent = "$0.00";
                }
            </script>
            
        </body>
    </html>
