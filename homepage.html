<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />

        <title>The Cup and Mug</title>

        <link rel="stylesheet" href="index.css" />
    </head>

    <body>
        <header class="site-header">
            <div class="container navbar">
                <h1 class="logo">The Cup and Mug</h1>

                <nav class="nav-links">
                    <a href="homepage.html">Home</a>
                    <a href="categoryGrid.html">Shop</a>
                    <a href="#">About</a>
                </nav>

                <img
                    class="cart-icon"
                    src="img/icon.svg"
                    alt="Shopping cart"
                />
            </div>
            <div id="cart-overlay" style="display:none">
                <button onclick="closeCart()">✕</button>
                <p>Your cart stuff here</p>
            </div>
        </header>

        <section class="hero">
            <div class="hero-overlay"></div>

            <div class="hero-content">
                <h2>
                    The Cup <br />
                    and Mug
                </h2>

                <p>Polish heritage, crafted in Melbourne.</p>
            </div>

            <div class="hero-gallery">
                <img src="img/image-4.png" alt="Ceramic cup" />
                <img src="img/image-11.png" alt="Handmade mug" />
                <img src="img/image-5.png" alt="Pottery collection" />
                <img src="img/image-6.png" alt="Ceramic plate" />
            </div>
        </section>

        <section class="quote-section">
            <div class="container">
                <blockquote>
                </blockquote>
            </div>
        </section>

        <section class="products-section">
            <div class="container">
                <div class="section-header">
                    <h3>New Arrivals</h3>
                    <a href="#" class="view-all-btn">
                        View all
                    </a>
                </div>
                <div class="product-grid">
                    <img src="img/image-7.png" alt="Ceramic product" />
                    <img src="img/image-8.png" alt="Ceramic product" />
                    <img src="img/image-9.png" alt="Ceramic product" />
                    <img src="img/image-10.png" alt="Ceramic product" />
                    <img src="img/image-12.png" alt="Ceramic product" />
                </div>
            </div>
        </section>

        <footer class="site-footer">
            <div class="container footer-content">
                <div>
                    <h4>Get in touch</h4>

                    <p>Phone: 0408 310 409</p>
                    <p>Email: heather@thecupandmug.com.au</p>
                </div>

                <div>
                    <h4>Where to find us</h4>

                    <p>
                        153 St. Georges Road<br />
                        Fitzroy North Victoria AUST.
                    </p>
                </div>
            </div>
        </footer>
        <script src="products.js"></script>
        <script src="cart.js"></script>
