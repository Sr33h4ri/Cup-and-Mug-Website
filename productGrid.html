<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>The Cup and Mug</title>

    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
            <div class="container">
                <div class="navbar">
                    <img class="back-btn" src="src/backIcon.png" alt="Back" onclick="history.back()"/>
                    <h1 class="logo">The Cup and Mug</h1>
                    <nav class="nav-links">
                        <a href="index.html">Home</a>
                        <a href="categoryGrid.html">Shop</a>
                        <a href="#">About</a>
                    </nav>
                    <div style="position:relative; cursor:pointer" onclick="openCart()">
                        <img class="cart-icon" src="src/cartIcon.png" alt="Shopping cart" />
                        <span class="cart-count" id="cart-count">0</span>
                    </div>
                </div>
            </div>
    </header>

    <div id="cart-backdrop" class="cart-backdrop" onclick="closeCart()"></div>
    <div id="cart-overlay" style="display:none" class="cart-overlay">
        <button class="cart-overlay-close" onclick="closeCart()">✕</button>
        <h2 class="cart-overlay-title">Cart</h2>
        <hr class="cart-overlay-divider">
        <div id="cart-overlay-items"></div>
        <hr class="cart-overlay-divider">
        <div class="cart-overlay-total">
            <span>Total</span>
            <span id="cart-overlay-total">$0.00</span>
        </div>
        <button type="button" class="btn" style="margin-top:1rem"
            onclick="window.location.href='checkout.html'">Checkout</button>
    </div>

    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search)
        const category = params.get("category") || "all"

        const grid = document.getElementById("product-grid")

        for (let i = 0; i < products.length; i++) {
            if (category === "all" || products[i].category === category) {
                grid.innerHTML += `
                    <div class="product-card" onclick="window.location.href='product.html?id=${products[i].id}'" style="cursor:pointer;">
                        <div class="product-card__image-wrap">
                            <img src="${products[i].image}" alt="${products[i].name}" class="product-card__img">
                        </div>
                        <div class="product-card__info">
                            <span class="product-card__category">${products[i].category}</span>
                            <h4 class="product-card__name">${products[i].name}</h4>
                            <div class="product-card__footer">
                                <span class="product-card__price">$${products[i].price}.00</span>
                                <button class="product-card__add" onclick="event.stopPropagation(); addToCart(${products[i].id})">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `
            }
        }

        function openCart() {
            const cart = getCart()
            const container = document.getElementById("cart-overlay-items")
            const totalEl = document.getElementById("cart-overlay-total")
            container.innerHTML = ""

            if (cart.length === 0) {
                container.innerHTML = "<p style='opacity:0.5; padding:1rem 0'>Your cart is empty.</p>"
                totalEl.textContent = "$0.00"
            } else {
                for (let i = 0; i < cart.length; i++) {
                    container.innerHTML += `
                        <div class="cart-overlay-item">
                            <span>${cart[i].name} × ${cart[i].quantity}</span>
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <span>$${(cart[i].price * cart[i].quantity).toFixed(2)}</span>
                                <button type="button" onclick="removeFromCart(${cart[i].id})" style="padding:0.25rem 0.5rem;">Remove</button>
                            </div>
                        </div>
                    `
                }
                totalEl.textContent = "$" + getCartTotal().toFixed(2)
            }
            document.getElementById("cart-overlay").style.display = "block"
        }

        function closeCart() {
            document.getElementById("cart-overlay").style.display = "none"
        }
    </script>
</body>
</html>
